services:
  - type: web
    name: vyre-chatbot-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: FRONTEND_URL
        sync: false